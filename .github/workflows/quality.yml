name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      RUN_HTTP_TESTS: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Guard runtime data and prepare an isolated database directory
        shell: bash
        run: |
          test ! -e .env
          test ! -e bot.db
          echo "DB_DIR=$RUNNER_TEMP/sewing-web-quality-db" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/sewing-web-quality-db"

      - name: Compile Python sources
        run: python scripts/check_python_compile.py

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Verify installed dependencies
        run: python -m pip check

      - name: Audit dependencies for known vulnerabilities
        run: |
          python -m pip install --disable-pip-version-check pip-audit==2.10.1
          python -m pip_audit -r requirements.txt

      - name: Run unittests
        run: python scripts/run_unittests_isolated.py

      - name: Audit web resources with a disposable database
        run: python scripts/smoke_web.py
